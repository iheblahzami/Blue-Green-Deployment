version: "3.9"

services:

  blue:
    build: ./api
    container_name: app-blue
    environment:
      VERSION: "blue"
    networks:
      - app-network

  green:
    build: ./api
    container_name: app-green
    environment:
      VERSION: "green"
    networks:
      - app-network

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/active.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - blue
      - green
    networks:
      - app-network

networks:
  app-network:
