version: "3.9"

services:

  blue:
    build: ./api
    container_name: app-blue
    environment:
      VERSION: "blue"
    networks:
      - app-network

  green:
    build: ./api
    container_name: app-green
    environment:
      VERSION: "green"
    networks:
      - app-network

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/active.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - blue
      - green
    networks:
      - app-network
      
  prometheus:
    image: prom/prometheus
    container_name: prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

    networks:
      - app-network

  grafana:
    image: grafana/grafana

    container_name: grafana

    ports:
      - "3001:3000"

    volumes:
      - grafana-data:/var/lib/grafana

    networks:
      - app-network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor

    container_name: cadvisor

    ports:
      - "8080:8080"

    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro

    privileged: true

    networks:
      - app-network      
      

networks:
  app-network:
  
volumes:
  grafana-data:  
